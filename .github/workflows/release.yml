name: release

# v로 시작하는 태그를 push하면 Mac(유니버설)+Windows 설치파일을 자동 빌드해
# GitHub Releases에 올린다. 예) git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # 수동 실행 버튼도 제공

permissions:
  contents: write # 릴리스 생성/업로드 권한

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust_targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ClipShot ${{ github.ref_name }}"
          releaseBody: |
            아래 **Assets**에서 다운로드하세요.
            - macOS: `.dmg` (Apple Silicon + Intel 유니버설)
            - Windows: `.exe` 또는 `.msi`

            > macOS: 서명이 없어 첫 실행 시 우클릭 → 열기 한 번이 필요합니다.
            > Windows: SmartScreen 경고가 뜨면 추가 정보 → 실행을 눌러주세요.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
